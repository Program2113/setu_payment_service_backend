services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:setu_password@db:5432/setu_db
      - TEST_DATABASE_URL=postgresql+asyncpg://postgres:setu_password@db:5432/setu_db
    depends_on:
      db:
        condition: service_healthy   # wait for Postgres to be ready, not just started
    restart: on-failure

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=setu_password
      - POSTGRES_DB=setu_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d setu_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
